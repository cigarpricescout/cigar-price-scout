<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review Matches - Cigar Price Scout</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#1a1a1a}
  .header{background:#1a1a1a;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100}
  .header h1{font-size:16px;font-weight:600}
  .header .stats{font-size:12px;color:#aaa;margin-top:2px}
  .filters{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:44px;z-index:99}
  .filters input[type="search"]{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a;width:100%;max-width:220px}
  .filters select,.filters button{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer}
  .filters button{font-weight:600}
  .filters button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .filters button.bulk-approve{background:#2e7d32;color:#fff;border-color:#2e7d32}
  .filters button.bulk-reject{background:#c62828;color:#fff;border-color:#c62828;margin-left:auto}
  .bulk-bar{background:#fffde7;border-bottom:1px solid #f9e04b;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;position:sticky;top:88px;z-index:98;display:none}
  .bulk-bar.active{display:flex}
  .bulk-bar .sel-count{font-weight:600}
  .bulk-bar button{font-size:13px;padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:600}
  .bulk-bar .ba{background:#2e7d32;color:#fff;margin-right:6px}
  .bulk-bar .br{background:#c62828;color:#fff;margin-right:6px}
  .bulk-bar .bc{background:#eee;color:#333}
  .cards{padding:8px}
  .card{background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;transition:opacity .3s,transform .3s}
  .card.removing{opacity:0;transform:translateX(100px);height:0;margin:0;padding:0;overflow:hidden}
  .card-body{padding:12px 14px}
  .card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card .confidence{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .card .confidence.HIGH{background:#e8f5e9;color:#2e7d32}
  .card .confidence.MEDIUM{background:#fff3e0;color:#e65100}
  .card .section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-top:10px}
  .card .section-label:first-of-type{margin-top:4px}
  .card .cid-name{font-size:15px;font-weight:600;line-height:1.3}
  .card .cid-details{font-size:13px;color:#444;margin-top:2px;line-height:1.5}
  .card .cid-details span{display:inline-block;margin-right:8px}
  .card .cid-details .label{color:#888;font-size:11px}
  .card .divider{border:none;border-top:1px dashed #e0e0e0;margin:8px 0}
  .card .product-title{font-size:13px;font-weight:500;color:#333;margin-top:2px}
  .card .product-meta{font-size:13px;color:#666;margin-top:2px;line-height:1.5}
  .card .product-meta span{display:inline-block;margin-right:10px}
  .card .retailer-tag{display:inline-block;background:#e3f2fd;color:#1565c0;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;margin-top:4px}
  .card .url-row{font-size:11px;color:#999;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .url-row a{color:#1565c0;text-decoration:none}
  .card .cid-full{font-family:monospace;font-size:11px;background:#f5f5f5;color:#333;padding:6px 8px;border-radius:4px;margin-top:6px;word-break:break-all;line-height:1.4}
  .card .actions{display:flex;gap:0;border-top:1px solid #eee;margin-top:10px}
  .card .actions button{flex:1;padding:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
  .card .actions .approve-btn{background:#f1f8f1;color:#2e7d32}
  .card .actions .approve-btn:active{background:#c8e6c9}
  .card .actions .reject-btn{background:#fef1f1;color:#c62828}
  .card .actions .reject-btn:active{background:#ffcdd2}
  .card .actions .select-btn{background:#f5f5f5;color:#666;flex:0 0 50px;border-left:1px solid #eee}
  .card .actions .select-btn.selected{background:#fff9c4;color:#f57f17}
  .paging{padding:12px 16px;display:flex;justify-content:center;gap:8px;align-items:center}
  .paging button{padding:8px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px}
  .paging button:disabled{opacity:.4;cursor:default}
  .paging .page-info{font-size:13px;color:#666}
  .empty{text-align:center;padding:60px 20px;color:#888}
  .empty h2{font-size:20px;margin-bottom:8px;color:#1a1a1a}
  .loading{text-align:center;padding:60px 20px;color:#888}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
  @media(min-width:640px){
    .cards{max-width:600px;margin:0 auto}
    .header,.filters,.bulk-bar{display:flex;justify-content:center}
    .header{display:block;text-align:center}
    .filters{justify-content:center}
  }
  /* Correction-flow visual treatment. We mark the whole card with a
     warm border so it stands out in a long pending queue, and use a
     distinct badge so the operator knows this is "consumer disagrees
     with our existing data" rather than "consumer is proposing new". */
  .card.correction-card{border:2px solid #f9a825;box-shadow:0 1px 6px rgba(249,168,37,.25)}
  .correction-badge{
    display:inline-block;background:#f9a825;color:#fff;
    font-size:10px;font-weight:700;letter-spacing:.5px;
    padding:2px 6px;border-radius:3px;margin-right:6px;vertical-align:middle;
  }
  .diff-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
  .diff-table th{text-align:left;font-weight:600;color:#666;padding:4px 6px;border-bottom:1px solid #eee}
  .diff-table td{padding:4px 6px;border-bottom:1px solid #f5f5f5;vertical-align:top}
  .diff-table .diff-label{color:#999;font-size:11px;text-transform:uppercase;letter-spacing:.3px;width:80px}
  .diff-table .diff-current{color:#666}
  .diff-table .diff-proposed{font-weight:600;color:#1a1a1a}
  .diff-table code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;background:#f5f5f5;padding:1px 4px;border-radius:3px;word-break:break-all}
</style>
</head>
<body>
<div class="header">
  <h1 id="page-title">Match Review</h1>
  <div class="stats" id="stats">Loading...</div>
</div>

<div class="filters source-toggle" id="source-toggle" style="background:#fafafa;border-bottom:1px solid #ddd;justify-content:center">
  <button id="btn-src-harvester" class="active" onclick="setSource('harvester')">Harvester queue</button>
  <button id="btn-src-community" onclick="setSource('community')">Community submissions <span id="cnt-community"></span></button>
</div>

<div class="filters" id="filters">
  <input type="search" id="search-box" placeholder="Search CID (e.g. Opus X, Red Dot)" onkeydown="if(event.key==='Enter'){doSearch()}" />
  <button id="btn-all" class="active" onclick="setConfidence('')">All</button>
  <button id="btn-high" onclick="setConfidence('HIGH')">HIGH <span id="cnt-high"></span></button>
  <button id="btn-medium" onclick="setConfidence('MEDIUM')">MED <span id="cnt-medium"></span></button>
  <select id="sel-retailer" onchange="setRetailer(this.value)">
    <option value="">All retailers</option>
  </select>
  <select id="sel-brand" onchange="setBrand(this.value)">
    <option value="">All brands</option>
  </select>
</div>

<div class="bulk-bar" id="bulk-bar">
  <div><span class="sel-count" id="sel-count">0</span> selected</div>
  <div>
    <button class="ba" onclick="bulkAction('approve')">Approve</button>
    <button class="br" onclick="bulkAction('reject')">Reject</button>
    <button class="bc" onclick="clearSelection()">Clear</button>
  </div>
</div>

<div class="cards" id="cards">
  <div class="loading">Loading matches...</div>
</div>

<div class="paging" id="paging" style="display:none">
  <button id="prev-btn" onclick="prevPage()">Prev</button>
  <span class="page-info" id="page-info"></span>
  <button id="next-btn" onclick="nextPage()">Next</button>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = new URLSearchParams(location.search).get('key') || '';
const PAGE_SIZE = 50;
let currentOffset = 0;
let currentConfidence = '';
let currentRetailer = '';
let currentBrand = '';
let currentSearch = '';
let totalMatches = 0;
let selectedTokens = new Set();
// Source toggle: 'harvester' uses url_staged_matches (default, the
// existing weekly-discovery agent flow). 'community' uses
// community_url_proposals (consumer extension submissions). Persisted
// via ?source= so links into either view are stable.
let currentSource = (new URLSearchParams(location.search).get('source') || 'harvester').toLowerCase();
if (currentSource !== 'community') currentSource = 'harvester';

async function fetchMatches() {
  if (currentSource === 'community') return fetchCommunityProposals();
  const params = new URLSearchParams({key: KEY, offset: currentOffset, limit: PAGE_SIZE});
  if (currentConfidence) params.set('confidence', currentConfidence);
  if (currentRetailer) params.set('retailer', currentRetailer);
  if (currentBrand) params.set('brand', currentBrand);
  if (currentSearch) params.set('search', currentSearch);

  const resp = await fetch('/api/admin/pending-matches?' + params);
  if (!resp.ok) { document.getElementById('cards').innerHTML = '<div class="empty"><h2>Error loading</h2></div>'; return null; }
  return resp.json();
}

async function fetchCommunityProposals() {
  // Community mode: same shape as fetchMatches() output so the
  // existing pager/empty-state/stats wiring works unchanged. We
  // remap proposal fields → match-card fields and synthesize a
  // confidence label from the matcher's top_candidate score.
  const params = new URLSearchParams({
    key: KEY, status: 'pending', limit: PAGE_SIZE,
  });
  let resp;
  try {
    resp = await fetch('/api/admin/community-proposals?' + params);
  } catch (e) {
    document.getElementById('cards').innerHTML = '<div class="empty"><h2>Network error</h2></div>';
    return null;
  }
  if (!resp.ok) {
    document.getElementById('cards').innerHTML = '<div class="empty"><h2>Error loading community proposals</h2></div>';
    return null;
  }
  const data = await resp.json();
  let proposals = data.results || [];

  // Apply client-side filters that mirror the harvester filters.
  // Server endpoint is small and unfiltered today; if the queue
  // grows we can push these to the API later.
  if (currentRetailer) proposals = proposals.filter(p => p.retailer_key === currentRetailer);
  if (currentBrand) proposals = proposals.filter(p => (p.proposed_brand || '').toLowerCase() === currentBrand.toLowerCase());
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    proposals = proposals.filter(p =>
      (p.proposed_brand || '').toLowerCase().includes(q) ||
      (p.proposed_line || '').toLowerCase().includes(q) ||
      (p.scraped_title || '').toLowerCase().includes(q) ||
      (p.url || '').toLowerCase().includes(q)
    );
  }
  if (currentConfidence) {
    proposals = proposals.filter(p => confidenceLabel(p) === currentConfidence);
  }

  const matches = proposals.map(proposalToMatchCard);
  const conf_counts = {HIGH: 0, MEDIUM: 0, LOW: 0};
  for (const p of (data.results || [])) conf_counts[confidenceLabel(p)] = (conf_counts[confidenceLabel(p)] || 0) + 1;
  const retailers = [...new Set((data.results || []).map(p => p.retailer_key).filter(Boolean))].sort();
  const brands = [...new Set((data.results || []).map(p => p.proposed_brand).filter(Boolean))].sort();

  return {
    total: matches.length,
    offset: 0,
    limit: PAGE_SIZE,
    confidence_counts: conf_counts,
    available_retailers: retailers,
    available_brands: brands,
    matches: matches,
    _community_count: (data.results || []).length,
  };
}

function confidenceLabel(p) {
  const tc = p.top_candidate;
  if (!tc) return 'LOW';
  const s = tc.score || 0;
  if (s >= 0.80) return 'HIGH';
  if (s >= 0.50) return 'MEDIUM';
  return 'LOW';
}

function proposalToMatchCard(p) {
  // Bridge the proposal shape onto the match-card renderer.
  // - token: encodes "community:<id>" so reviewOne()/bulkAction() can
  //   route to the resolve-community-proposal endpoint
  // - cid: top_candidate.cigar_id when matcher found one, else blank
  // - reason: synthesizes "product='<scraped_title>' variant='<source>'"
  //   so the existing parseReason() pulls a sensible product title
  const tc = p.top_candidate || null;
  const productTitle = p.scraped_title
    || [p.proposed_brand, p.proposed_line, p.proposed_vitola].filter(Boolean).join(' ')
    || '(no title)';
  const variantLabel = p.observer_source ? `consumer ext (${p.observer_source})` : 'consumer ext';
  const reason = `product='${productTitle.replace(/'/g, "")}' variant='${variantLabel}'`;
  return {
    token: `community:${p.id}`,
    cid: tc ? tc.cigar_id : '',
    retailer_key: p.retailer_key || '',
    url: p.url || '',
    confidence: confidenceLabel(p),
    reason: reason,
    brand: p.proposed_brand || (tc && tc.brand) || '',
    line: p.proposed_line || (tc && tc.line) || '',
    vitola: p.proposed_vitola || '',
    wrapper: p.proposed_wrapper || '',
    size: p.proposed_size || '',
    box_qty: p.proposed_box_qty || null,
    price: p.confirmed_price_cents != null ? p.confirmed_price_cents / 100 : null,
    in_stock: null,
    created_at: p.created_at,
    _community: true,
    _proposal_id: p.id,
    _top_candidate: tc,
    // Correction-flow fields. is_correction means this came from the
    // consumer popup's "Report incorrect" button on a URL we already
    // had a CID for — so the operator should compare proposed vs.
    // current rather than treating it as a fresh URL.
    _is_correction: !!p.is_correction,
    _current_cid: p.current_cid || '',
    _current_price: p.current_price_cents != null ? p.current_price_cents / 100 : null,
  };
}

function parseReason(reason) {
  if (!reason) return {};
  const prodMatch = reason.match(/product='([^']+)'/);
  const varMatch = reason.match(/variant='([^']+)'/);
  return {
    productTitle: prodMatch ? prodMatch[1] : '',
    variantTitle: varMatch ? varMatch[1] : '',
  };
}

function renderCard(m) {
  if (m._community) return renderCommunityCard(m);
  const price = m.price ? `$${m.price.toFixed(2)}` : '';
  const stock = m.in_stock === true ? 'In Stock' : m.in_stock === false ? 'Out of Stock' : '';
  const stockColor = m.in_stock === true ? '#2e7d32' : '#c62828';
  const selected = selectedTokens.has(m.token) ? ' selected' : '';
  const parsed = parseReason(m.reason);

  return `<div class="card" id="card-${m.token}">
    <div class="card-body">
      <div class="top-row">
        <div>
          <div class="section-label">CID (What you're approving)</div>
        </div>
        <span class="confidence ${m.confidence}">${m.confidence}</span>
      </div>
      <div class="cid-full">${m.cid || '—'}</div>

      <hr class="divider">

      <div class="section-label">Retailer Product (Matched to)</div>
      <div class="product-title">${parsed.productTitle || '—'}</div>
      <div class="product-meta">
        <span class="retailer-tag">${m.retailer_key}</span>
        ${price ? `<span style="font-weight:600">${price}</span>` : ''}
        ${stock ? `<span style="color:${stockColor}">${stock}</span>` : ''}
      </div>
      <div class="url-row"><a href="${m.url}" target="_blank">${m.url}</a></div>
    </div>
    <div class="actions">
      <button class="approve-btn" onclick="reviewOne('${m.token}','approve')">Approve</button>
      <button class="reject-btn" onclick="reviewOne('${m.token}','reject')">Reject</button>
      <button class="select-btn${selected}" onclick="toggleSelect('${m.token}')" title="Select for bulk action">&#9744;</button>
    </div>
  </div>`;
}

function renderCommunityCard(m) {
  const tc = m._top_candidate;
  const haveCID = !!(tc && tc.cigar_id);
  const isHigh = m.confidence === 'HIGH';
  const selected = selectedTokens.has(m.token) ? ' selected' : '';
  const consumerLine = [m.brand, m.line, m.vitola].filter(Boolean).join(' ');
  const priceStr = m.price != null ? `$${m.price.toFixed(2)}` : null;
  const consumerMeta = [
    m.box_qty ? `Box of ${m.box_qty}` : null,
    m.wrapper || null,
    m.size || null,
    priceStr,
  ].filter(Boolean).join(' · ');

  // Approve button behaviour:
  //   HIGH-confidence + CID: one-click stages an approve_existing.
  //   MEDIUM/LOW: requires extension popup for CID confirmation, so
  //   we show "Open in extension" pointing at the URL — operator
  //   visits the page, the popup pre-fills with this proposal data
  //   (Gap 1), they approve there.
  // Corrections always need a human eye even at HIGH confidence — we
  // intentionally route them to the extension popup so the operator
  // can compare the proposed values against the current CID's master
  // record before flipping anything.
  const approveBtn = (m._is_correction)
    ? `<button class="approve-btn" style="background:#fff3e0;color:#e65100" onclick="openInExtension('${m.url.replace(/'/g, "\\'")}')">Review in extension</button>`
    : (haveCID && isHigh)
      ? `<button class="approve-btn" onclick="reviewOne('${m.token}','approve')">Approve →</button>`
      : `<button class="approve-btn" style="background:#fff3e0;color:#e65100" onclick="openInExtension('${m.url.replace(/'/g, "\\'")}')">Open in extension</button>`;

  // For correction rows, render the side-by-side diff between what we
  // were showing and what the consumer proposes. This is the whole
  // point of the correction flow — the operator's decision is
  // "should we trust this consumer over our current data?".
  const correctionDiff = m._is_correction ? renderCorrectionDiff(m) : '';

  return `<div class="card${m._is_correction ? ' correction-card' : ''}" id="card-${m.token}">
    <div class="card-body">
      <div class="top-row">
        <div>
          <div class="section-label">
            ${m._is_correction
              ? '<span class="correction-badge" title="Consumer reported the existing CID/price is wrong">CORRECTION</span> Consumer disagrees'
              : 'Consumer suggested'}
          </div>
          <div class="cid-name">${escHTML(consumerLine || m.reason || '(no metadata)')}</div>
          <div class="cid-details">${escHTML(consumerMeta)}</div>
        </div>
        <span class="confidence ${m.confidence}">${m.confidence}</span>
      </div>

      ${correctionDiff}

      ${(!m._is_correction && haveCID) ? `
        <hr class="divider">
        <div class="section-label">Matcher's best CID guess</div>
        <div class="cid-full">${escHTML(tc.cigar_id)}</div>
        <div class="cid-details" style="margin-top:4px">
          <span class="label">score</span> ${(tc.score || 0).toFixed(2)}
          ${tc.brand ? `&nbsp;·&nbsp;<span class="label">brand</span> ${escHTML(tc.brand)}` : ''}
          ${tc.line ? `&nbsp;·&nbsp;<span class="label">line</span> ${escHTML(tc.line)}` : ''}
        </div>
      ` : (!m._is_correction ? `
        <hr class="divider">
        <div class="cid-details" style="color:#c62828">No confident CID match — needs operator review via extension popup.</div>
      ` : '')}

      <hr class="divider">

      <div class="section-label">Source</div>
      <div class="product-meta">
        <span class="retailer-tag">${escHTML(m.retailer_key || 'unknown retailer')}</span>
      </div>
      <div class="url-row"><a href="${m.url}" target="_blank" rel="noopener">${escHTML(m.url)}</a></div>
    </div>
    <div class="actions">
      ${approveBtn}
      <button class="reject-btn" onclick="reviewOne('${m.token}','reject')">Reject</button>
      <button class="select-btn${selected}" onclick="toggleSelect('${m.token}')" title="Select for bulk action">&#9744;</button>
    </div>
  </div>`;
}

// Renders the proposed-vs-current diff inside a correction card. We
// don't have the master record's brand/line/vitola server-side at this
// point (that would require another lookup against current_cid), so
// the "current" column shows what we know: the CID itself + the price
// we were displaying when the consumer reported the issue. The
// "proposed" column shows what they typed.
function renderCorrectionDiff(m) {
  const currentPrice = m._current_price != null ? `$${m._current_price.toFixed(2)}` : '—';
  const proposedPrice = m.price != null ? `$${m.price.toFixed(2)}` : '—';
  const priceDiff = (m._current_price != null && m.price != null)
    ? Math.abs(m.price - m._current_price)
    : null;
  const priceWarn = (priceDiff != null && m._current_price > 0 && (priceDiff / m._current_price) > 0.4)
    ? ' style="color:#c62828;font-weight:600"'
    : '';

  return `
    <hr class="divider">
    <div class="section-label">What changed</div>
    <table class="diff-table">
      <thead>
        <tr><th></th><th>Currently showing</th><th>Consumer says</th></tr>
      </thead>
      <tbody>
        <tr>
          <td class="diff-label">CID</td>
          <td class="diff-current"><code>${escHTML(m._current_cid || '—')}</code></td>
          <td class="diff-proposed">${escHTML([m.brand, m.line, m.vitola].filter(Boolean).join(' ') || '—')}</td>
        </tr>
        <tr>
          <td class="diff-label">Box qty</td>
          <td class="diff-current">${m._current_cid ? extractBoxQtyFromCid(m._current_cid) || '—' : '—'}</td>
          <td class="diff-proposed">${m.box_qty || '—'}</td>
        </tr>
        <tr>
          <td class="diff-label">Sale price</td>
          <td class="diff-current">${currentPrice}</td>
          <td class="diff-proposed"${priceWarn}>${proposedPrice}</td>
        </tr>
        <tr>
          <td class="diff-label">Wrapper</td>
          <td class="diff-current">—</td>
          <td class="diff-proposed">${escHTML(m.wrapper || '—')}</td>
        </tr>
      </tbody>
    </table>
    <div class="cid-details" style="margin-top:6px;color:#666">
      Sale prices are reported WITHOUT coupon codes applied. If the
      consumer's price is far below current, double-check the box qty
      and verify they didn't subtract a code.
    </div>
  `;
}

function extractBoxQtyFromCid(cid) {
  if (!cid) return '';
  const tail = cid.split('|').pop() || '';
  const m = tail.toUpperCase().match(/^(?:BOX|PACK)(\d+)$/);
  if (m) return m[1];
  if (tail.toUpperCase() === 'SINGLE') return '1';
  return '';
}

function escHTML(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function openInExtension(url) {
  // Best we can do from a web page: open the URL in a new tab so the
  // operator can use the extension popup there.
  window.open(url, '_blank', 'noopener');
}

async function loadPage() {
  selectedTokens.clear();
  updateBulkBar();
  const data = await fetchMatches();
  if (!data) return;

  // Refresh the community-queue badge whenever we load a page so a
  // local action (approve/reject) immediately decrements it without
  // waiting for the 60s timer.
  refreshCommunityBadge();

  totalMatches = data.total;
  const cc = data.confidence_counts || {};

  document.getElementById('stats').textContent =
    `${totalMatches} pending | ${cc.HIGH || 0} HIGH | ${cc.MEDIUM || 0} MEDIUM`;
  document.getElementById('cnt-high').textContent = cc.HIGH ? `(${cc.HIGH})` : '';
  document.getElementById('cnt-medium').textContent = cc.MEDIUM ? `(${cc.MEDIUM})` : '';

  const retSel = document.getElementById('sel-retailer');
  const oldRet = retSel.value;
  retSel.innerHTML = '<option value="">All retailers</option>';
  (data.available_retailers || []).forEach(r => {
    retSel.innerHTML += `<option value="${r}" ${r === oldRet ? 'selected' : ''}>${r}</option>`;
  });

  const brandSel = document.getElementById('sel-brand');
  const oldBrand = brandSel.value;
  brandSel.innerHTML = '<option value="">All brands</option>';
  (data.available_brands || []).forEach(b => {
    brandSel.innerHTML += `<option value="${b}" ${b === oldBrand ? 'selected' : ''}>${b}</option>`;
  });

  const container = document.getElementById('cards');
  if (data.matches.length === 0) {
    container.innerHTML = '<div class="empty"><h2>All clear!</h2><p>No matches to review.</p></div>';
    document.getElementById('paging').style.display = 'none';
    return;
  }
  container.innerHTML = data.matches.map(renderCard).join('');

  const pg = document.getElementById('paging');
  const page = Math.floor(currentOffset / PAGE_SIZE) + 1;
  const totalPages = Math.ceil(totalMatches / PAGE_SIZE);
  document.getElementById('page-info').textContent = `Page ${page} of ${totalPages}`;
  document.getElementById('prev-btn').disabled = currentOffset === 0;
  document.getElementById('next-btn').disabled = currentOffset + PAGE_SIZE >= totalMatches;
  pg.style.display = totalPages > 1 ? 'flex' : 'none';
}

async function reviewOne(token, action) {
  const card = document.getElementById('card-' + token);
  if (!card) return;
  card.classList.add('removing');

  try {
    if (token.startsWith('community:')) {
      // Community proposal: hits resolve-community-proposal with the
      // top_candidate's CID for approve, or action='reject' for reject.
      const proposal_id = parseInt(token.split(':')[1], 10);
      // Pull the suggested CID off the rendered card (we stashed it on
      // the dataset in renderCommunityCard's CID block — fall back to
      // empty string which the server will reject loudly).
      const cidEl = card.querySelector('.cid-full');
      const cid = cidEl ? cidEl.textContent.trim() : '';
      const body = (action === 'approve')
        ? {proposal_id, action: 'approve_existing', cid}
        : {proposal_id, action: 'reject'};
      const resp = await fetch('/api/admin/resolve-community-proposal', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Admin-Key': KEY},
        body: JSON.stringify(body),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || 'failed');
      showToast(action === 'approve' ? 'Approved & staged' : 'Rejected');
    } else {
      await fetch(`/admin/match/${token}/${action}`, {method: 'GET'});
      showToast(action === 'approve' ? 'Approved' : 'Rejected');
    }
  } catch(e) {
    card.classList.remove('removing');
    showToast('Error: ' + (e.message || 'failed'), true);
    return;
  }

  setTimeout(() => {
    card.remove();
    totalMatches--;
    document.getElementById('stats').textContent = document.getElementById('stats').textContent
      .replace(/^\d+/, totalMatches);
    if (document.querySelectorAll('.card').length === 0) loadPage();
  }, 350);
}

function toggleSelect(token) {
  if (selectedTokens.has(token)) selectedTokens.delete(token);
  else selectedTokens.add(token);
  const btn = document.querySelector(`#card-${token} .select-btn`);
  if (btn) btn.classList.toggle('selected', selectedTokens.has(token));
  updateBulkBar();
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  document.getElementById('sel-count').textContent = selectedTokens.size;
  bar.classList.toggle('active', selectedTokens.size > 0);
}

function clearSelection() {
  selectedTokens.clear();
  document.querySelectorAll('.select-btn.selected').forEach(b => b.classList.remove('selected'));
  updateBulkBar();
}

async function bulkAction(action) {
  if (selectedTokens.size === 0) return;
  const tokens = [...selectedTokens];
  const harvesterTokens = tokens.filter(t => !t.startsWith('community:'));
  const communityIds = tokens
    .filter(t => t.startsWith('community:'))
    .map(t => parseInt(t.split(':')[1], 10));

  try {
    if (harvesterTokens.length) {
      const resp = await fetch('/api/admin/bulk-review', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Admin-Key': KEY},
        body: JSON.stringify({action, tokens: harvesterTokens})
      });
      const data = await resp.json();
      showToast(`${data.updated || 0} harvester ${action === 'approve' ? 'approved' : 'rejected'}`);
    }
    if (communityIds.length) {
      // No bulk endpoint on the server side yet — fan out one request
      // per proposal. Cheap for typical queue sizes (single-digits to
      // low double-digits per session).
      let ok = 0, fail = 0;
      for (const id of communityIds) {
        const card = document.getElementById('card-community:' + id);
        const cidEl = card ? card.querySelector('.cid-full') : null;
        const cid = cidEl ? cidEl.textContent.trim() : '';
        const body = (action === 'approve')
          ? {proposal_id: id, action: 'approve_existing', cid}
          : {proposal_id: id, action: 'reject'};
        try {
          const resp = await fetch('/api/admin/resolve-community-proposal', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Admin-Key': KEY},
            body: JSON.stringify(body),
          });
          if (resp.ok) ok++; else fail++;
        } catch(e) { fail++; }
      }
      showToast(`${ok} community ${action === 'approve' ? 'approved' : 'rejected'}${fail ? `, ${fail} failed` : ''}`, fail > 0);
    }
  } catch(e) { showToast('Bulk action failed', true); }

  tokens.forEach(t => {
    const card = document.getElementById('card-' + t);
    if (card) card.classList.add('removing');
  });
  selectedTokens.clear();
  updateBulkBar();
  setTimeout(() => loadPage(), 400);
}

function setConfidence(val) {
  currentConfidence = val;
  currentOffset = 0;
  // Only toggle confidence buttons inside #filters (NOT the source-toggle bar).
  document.querySelectorAll('#filters button[id^="btn-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(val ? `btn-${val.toLowerCase()}` : 'btn-all').classList.add('active');
  loadPage();
}

function setSource(src) {
  if (src !== 'community' && src !== 'harvester') return;
  if (currentSource === src) return;
  currentSource = src;
  currentOffset = 0;
  currentConfidence = '';
  currentRetailer = '';
  currentBrand = '';
  currentSearch = '';
  document.getElementById('search-box').value = '';
  // Update toggle button styles
  document.getElementById('btn-src-harvester').classList.toggle('active', src === 'harvester');
  document.getElementById('btn-src-community').classList.toggle('active', src === 'community');
  // Reset the confidence-row "All" pill so the previous selection
  // doesn't visually persist when switching.
  document.querySelectorAll('#filters button[id^="btn-"]').forEach(b => b.classList.remove('active'));
  const allBtn = document.getElementById('btn-all');
  if (allBtn) allBtn.classList.add('active');
  // Update page title + URL so refresh keeps the chosen view.
  document.getElementById('page-title').textContent =
    src === 'community' ? 'Community Submissions' : 'Match Review';
  const url = new URL(location.href);
  if (src === 'harvester') url.searchParams.delete('source');
  else url.searchParams.set('source', src);
  history.replaceState(null, '', url);
  loadPage();
}

async function refreshCommunityBadge() {
  // Independent of the active mode — always show how many community
  // proposals are pending so the operator sees the queue at a glance.
  // Skip candidate matching to keep the badge query fast.
  try {
    const resp = await fetch('/api/admin/community-proposals?' + new URLSearchParams({
      key: KEY, status: 'pending', limit: 500, include_candidates: 'false',
    }));
    if (!resp.ok) return;
    const data = await resp.json();
    const n = (data.results || []).length;
    const badge = document.getElementById('cnt-community');
    if (badge) badge.textContent = n > 0 ? `(${n >= 500 ? '500+' : n})` : '';
  } catch (e) { /* silent */ }
}
function setRetailer(val) { currentRetailer = val; currentOffset = 0; loadPage(); }
function setBrand(val) { currentBrand = val; currentOffset = 0; loadPage(); }
function doSearch() {
  currentSearch = document.getElementById('search-box').value.trim();
  currentOffset = 0;
  loadPage();
}
function nextPage() { currentOffset += PAGE_SIZE; loadPage(); window.scrollTo(0, 0); }
function prevPage() { currentOffset = Math.max(0, currentOffset - PAGE_SIZE); loadPage(); window.scrollTo(0, 0); }

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#c62828' : '#1a1a1a';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Sync the source-toggle UI with whatever ?source= we landed on.
(function initSource() {
  document.getElementById('btn-src-harvester').classList.toggle('active', currentSource === 'harvester');
  document.getElementById('btn-src-community').classList.toggle('active', currentSource === 'community');
  document.getElementById('page-title').textContent =
    currentSource === 'community' ? 'Community Submissions' : 'Match Review';
})();

refreshCommunityBadge();
// Refresh the badge every 60s so operator notices new submissions
// without having to reload — same cadence the popup uses for its
// own /url-status pings.
setInterval(refreshCommunityBadge, 60_000);

loadPage();
</script>
