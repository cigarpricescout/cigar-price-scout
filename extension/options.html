<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cigar Price Scout — Extension Settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 24px;
    color: #1a1a1a;
  }
  .card {
    max-width: 560px;
    margin: 0 auto;
    background: #fff;
    border-radius: 10px;
    padding: 24px 28px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; margin: 14px 0 4px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px;
    background: #fff;
  }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
  button {
    padding: 8px 14px; border-radius: 6px; border: 1px solid #ccc;
    background: #fff; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.primary:hover { background: #333; }
  .status { font-size: 13px; margin-left: 8px; }
  .status.ok    { color: #2e7d32; }
  .status.err   { color: #c62828; }
  .status.mute  { color: #888; }
  .hint { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.5; }
  code { background: #f5f5f5; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<div class="card">
  <h1>Cigar Price Scout — Extension Settings</h1>
  <div class="subtitle">Stored locally on this device only; never synced.</div>

  <label for="admin-key">Admin secret key</label>
  <input id="admin-key" type="password" autocomplete="off" placeholder="paste your ADMIN_SECRET_KEY here" />
  <div class="hint">
    Same key the site uses for <code>/admin/review</code>. The extension sends it
    in the <code>X-Admin-Key</code> header to <code>cigarpricescout.com</code>.
  </div>

  <div class="row">
    <button class="primary" id="save">Save</button>
    <button id="test">Test connection</button>
    <button id="show-hide">Show</button>
    <span class="status mute" id="status">Not tested.</span>
  </div>
</div>

<script type="module" src="options.js"></script>
</body>
</html>
