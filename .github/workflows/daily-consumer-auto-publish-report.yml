# Nightly snapshot of consumer-confirmed auto-publish rows (source=consumer_auto).
# Primary operator workflow: GET /api/admin/auto-publish-report (smoke-tests UI).
# When repository secret ADMIN_SECRET_KEY is set, this job also uploads JSON
# as a GitHub artifact for offline review.
name: Daily consumer auto-publish report

on:
  schedule:
    - cron: "15 14 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch report from production
        env:
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
        run: |
          set -e
          if [ -z "$ADMIN_SECRET_KEY" ]; then
            echo '{"skipped":true,"reason":"Set repo secret ADMIN_SECRET_KEY to enable fetch"}' > consumer_auto_report.json
            exit 0
          fi
          curl -fsS -o consumer_auto_report.json \
            -H "X-Admin-Key: ${ADMIN_SECRET_KEY}" \
            "https://cigarpricescout.com/api/admin/auto-publish-report?days=1&limit=500"
          echo "Downloaded $(wc -c < consumer_auto_report.json) bytes."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: consumer-auto-publish-${{ github.run_id }}
          path: consumer_auto_report.json
